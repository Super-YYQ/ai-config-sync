name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node: [18, 20, 22]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - name: Install
        run: npm ci
      - name: Build (includes plugin CLI bundle)
        run: npm run build
      - name: Test
        run: npm test
      - name: Pack dry-run
        run: npm pack --dry-run
      - name: Smoke npm package
        run: npm run smoke:npm
        if: matrix.os == 'ubuntu-latest' && matrix.node == '20'

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Block obvious secrets in repo
        run: |
          if git grep -I -E 'sk-ant-|ghp_[A-Za-z0-9]{20,}|BEGIN (RSA |OPENSSH )?PRIVATE KEY' -- ':!*.md' ':!CHANGELOG.md' ':!docs/**' ; then
            echo "Possible secrets found"
            exit 1
          fi
          echo "OK"
