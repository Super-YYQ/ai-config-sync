name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node: [18, 20, 22]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - name: Install
        run: npm ci
      - name: Build (includes plugin CLI bundle)
        run: npm run build
      - name: Version consistency
        run: node scripts/check-version-consistency.mjs
      - name: Build is clean (no dirty tree)
        # Ignore executable-bit-only changes (chmod 755 on Unix after bundle)
        # and CR-at-EOL for Windows .cmd shims rewritten by the build.
        run: git -c core.fileMode=false diff --exit-code --ignore-cr-at-eol
        shell: bash
      - name: Test
        run: npm test
      - name: Pack dry-run
        run: npm pack --dry-run
      - name: Validate Claude plugin manifests
        run: npm run validate:plugin
        if: (matrix.os == 'ubuntu-latest' || matrix.os == 'windows-latest') && matrix.node == '20'
      - name: Smoke npm package (isolated tarball)
        run: npm run smoke:npm
        if: (matrix.os == 'ubuntu-latest' || matrix.os == 'windows-latest') && matrix.node == '20'

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Block obvious secrets in repo
        run: |
          set -euo pipefail
          hits="$(
            git grep -I -n -E \
              '(^|[^A-Za-z0-9_/-])(sk-ant-[A-Za-z0-9_-]{20,}|ghp_[A-Za-z0-9]{20,}|-----BEGIN (RSA |OPENSSH )?PRIVATE KEY-----)' \
              -- \
              ':!*.md' \
              ':!CHANGELOG.md' \
              ':!package-lock.json' \
            || true
          )"
          filtered="$(
            printf '%s\n' "$hits" | grep -v -E \
              'packages/core/src/secrets\.ts:|integrations/claude-plugin/bin/|dist/ai-config-sync\.cjs:|tests/unit/.*\.test\.ts:|re:\s*/|\\bsk-ant-|\\bghp_|scanTextForSecrets|abcdefghijklmnopqrstuvwxyz|name:\s*"(anthropic|github|openai)|validate-plugin\.mjs:' \
            || true
          )"
          if [ -n "$(echo "$filtered" | sed '/^\s*$/d')" ]; then
            echo "Possible secrets found:"
            echo "$filtered"
            exit 1
          fi
          echo "OK (allowlisted detector/test fixtures only)"
