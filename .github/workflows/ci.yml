name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node: [18, 20, 22]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - name: Install
        run: npm ci
      - name: Build (includes plugin CLI bundle)
        run: npm run build
      - name: Test
        run: npm test
      - name: Pack dry-run
        run: npm pack --dry-run
      - name: Smoke npm package
        run: npm run smoke:npm
        if: matrix.os == 'ubuntu-latest' && matrix.node == '20'

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Block obvious secrets in repo
        run: |
          # Match real secret *values*, not detector source patterns like
          # `re: /\bsk-ant-[A-Za-z0-9...]` or fixture strings in unit tests.
          # Exclude: docs, detector source, bundled CLI (mirrors detector), tests.
          set -euo pipefail
          hits="$(
            git grep -I -n -E \
              'sk-ant-[A-Za-z0-9_-]{20,}|ghp_[A-Za-z0-9]{20,}|BEGIN (RSA |OPENSSH )?PRIVATE KEY' \
              -- \
              ':!*.md' \
              ':!CHANGELOG.md' \
              ':!docs/**' \
              ':!packages/core/src/secrets.ts' \
              ':!integrations/claude-plugin/bin/**' \
              ':!dist/**' \
              ':!tests/**' \
            || true
          )"
          # Drop pure regex / pattern-definition lines (no live token assignment)
          filtered="$(
            printf '%s\n' "$hits" | grep -v -E \
              're:\s*/|\\\\bsk-ant-|\\\\bghp_|scanTextForSecrets|name:\s*"(anthropic|github|openai)' \
            || true
          )"
          if [ -n "$(echo "$filtered" | sed '/^\s*$/d')" ]; then
            echo "Possible secrets found:"
            echo "$filtered"
            exit 1
          fi
          echo "OK"
